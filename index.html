<style>
  /* self-host 서브셋 — 페이지에 실제 쓰는 글자만. 외부 도메인 0, 요청 3건.
     CDN 이던 시절: 287KB / 요청 11건 / 외부 3곳(googleapis·gstatic·jsdelivr). */
  @font-face{font-family:'Gaegu';font-style:normal;font-weight:700;font-display:swap;
    src:url('f-gaegu-b.woff2') format('woff2')}
  @font-face{font-family:'Pretendard';font-style:normal;font-weight:400;font-display:swap;
    src:url('f-pre-r.woff2') format('woff2')}
  @font-face{font-family:'Pretendard';font-style:normal;font-weight:600;font-display:swap;
    src:url('f-pre-sb.woff2') format('woff2')}
  :root{
    --cream:#FCFBF9; --cream2:#F4EFE6; --card:#FFFFFF;
    --ink:#2F2C27; --ink-soft:#797368;   /* ink-faint(#A9A296) 삭제 — 크림 위 2.45 라 텍스트 불가. 필요하면 ink-soft */
    --berry:#8B6B47; --berry-deep:#6F5436;
    --caramel:#C9A87C;   /* 면(리본·카톡블록) — 잉크 글씨 6.21:1. 테두리는 berry 로 잡아 크림 배경과 갈라줌 */
    --on-caramel:#4B3823;/* 카라멜 위 부제용. berry-deep(#6F5436)은 3.13 미달이라 쓰면 안 됨 */
    --line:#ECE4D6; --line-soft:#F4EEE3;
    --serif:'Gaegu','Apple SD Gothic Neo',sans-serif;
    --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;min-width:0}
  html{color-scheme:light;-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.6;
       word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .ribbon{background:var(--caramel);color:var(--ink);text-align:center;font-size:13px;line-height:1.5;padding:9px 14px;font-weight:600;
          border-bottom:1px solid var(--berry)}
  .wrap{max-width:680px;margin:0 auto;padding:26px 18px calc(44px + env(safe-area-inset-bottom))}
  .hero{text-align:center;padding:14px 0 26px}
  .logo{width:74px;height:74px;display:block;margin:0 auto 8px;border-radius:50%;object-fit:cover;border:1px solid var(--line)}
  .name{font-family:var(--serif);font-size:34px;font-weight:700;margin:0;letter-spacing:.5px}
  .tag{color:var(--ink-soft);font-size:14px;margin:6px 0 0}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* 카드형: 사진 위 / 라벨은 흰 카드 아래. 사진 위에 글씨를 얹지 않으므로
     밝은 디저트 사진을 어둡게 덮을 필요가 없고 대비도 항상 확보된다. */
  .b{display:flex;flex-direction:column;border-radius:20px;overflow:hidden;
     border:1px solid var(--line);background:var(--card);
     box-shadow:0 1px 2px rgba(47,44,39,.04);
     /* 카드와 사진이 같은 곡선을 쓰게 통일. 예전엔 카드 .18s / 사진 .5s 라 따로 놀았음 */
     transition:transform .42s var(--ease), box-shadow .42s var(--ease)}
  .ph{position:relative;background:var(--cream2);aspect-ratio:4/3;overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.001);
           transition:transform .7s var(--ease)}
  .t{padding:13px 14px 15px}
  .k{font-family:var(--serif);font-size:21px;font-weight:700;line-height:1.25;color:var(--ink)}
  .s{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

  .big{grid-column:1 / -1}
  .big .ph{aspect-ratio:16/9}
  .big .k{font-size:27px}
  .big .t{padding:15px 18px 18px}
  .wide{grid-column:1 / -1;flex-direction:row;align-items:center}
  .wide .ph{aspect-ratio:1/1;width:96px;flex:0 0 96px}
  .wide .t{padding:14px 16px}

  .kakao{grid-column:1 / -1;background:var(--caramel);border-color:var(--berry);
         align-items:center;justify-content:center;padding:18px 14px}
  .kakao .t{padding:0;text-align:center}
  .kakao .k{font-size:23px;color:var(--ink)}
  .kakao .s{color:var(--on-caramel)}

  @media(hover:hover){
    .b{will-change:transform}
    .b:hover{transform:translateY(-5px);box-shadow:0 16px 34px rgba(47,44,39,.13)}
    .b:hover .ph img{transform:scale(1.055)}
  }
  .b:active{transform:translateY(-2px);transition-duration:.1s}
  .b:focus-visible{outline:2px solid var(--berry-deep);outline-offset:3px}
  .foot{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:28px;line-height:1.7}
  @media(min-width:721px){ .wrap{padding-top:40px} .grid{gap:14px} .wide .ph{width:120px;flex-basis:120px} }
</style>
